name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  repository-projects: write

jobs:
  release:
    name: Bump Version & Tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest tag
        id: latest_tag
        run: |
          TAG=$(git tag --sort=-v:refname | head -n 1)
          if [ -z "$TAG" ]; then
            TAG="v0.0.0"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $TAG"

      - name: Determine version bump
        id: bump
        run: |
          LATEST=${{ steps.latest_tag.outputs.tag }}
          # Get all commits since last tag
          COMMITS=$(git log ${LATEST}..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          BUMP="patch"
          if echo "$COMMITS" | grep -qiE "^breaking(\(.+\))?!?:"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
            BUMP="minor"
          fi

          echo "bump=$BUMP" >> $GITHUB_OUTPUT
          echo "Version bump: $BUMP"

          - name: Calculate new version
              id: version
              run: |
                LATEST=${{ steps.latest_tag.outputs.tag }}
                BUMP=${{ steps.bump.outputs.bump }}
                
                # Strip leading v
                VERSION=${LATEST#v}
                MAJOR=$(echo $VERSION | cut -d. -f1)
                MINOR=$(echo $VERSION | cut -d. -f2)
                PATCH=$(echo $VERSION | cut -d. -f3)
                
                if [ "$BUMP" = "major" ]; then
                  if [ "$MAJOR" -eq 0 ]; then
                    # PRE-v1.0 GUARD: 
                    MINOR=$((MINOR + 1)); PATCH=0
                  else
                    MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
                  fi
                elif [ "$BUMP" = "minor" ]; then
                  MINOR=$((MINOR + 1)); PATCH=0
                else
                  PATCH=$((PATCH + 1))
                fi
                
                NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
                echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
                echo "New version: $NEW_VERSION"

      - name: Generate changelog
        id: changelog
        run: |
          LATEST=${{ steps.latest_tag.outputs.tag }}
          NEW=${{ steps.version.outputs.new_version }}
          DATE=$(date +%Y-%m-%d)

          BREAKING=$(git log ${LATEST}..HEAD --pretty=format:"- %s" | grep -iE "^- breaking" || true)
          FEATURES=$(git log ${LATEST}..HEAD --pretty=format:"- %s" | grep -iE "^- feat" || true)
          FIXES=$(git log ${LATEST}..HEAD --pretty=format:"- %s" | grep -iE "^- fix" || true)
          CHORES=$(git log ${LATEST}..HEAD --pretty=format:"- %s" | grep -iE "^- (chore|docs|refactor)" || true)

          ENTRY="## ${NEW} (${DATE})\n"
          [ -n "$BREAKING" ] && ENTRY="${ENTRY}\n### ⚠️ Breaking Changes\n${BREAKING}\n"
          [ -n "$FEATURES" ] && ENTRY="${ENTRY}\n### ✨ Features\n${FEATURES}\n"
          [ -n "$FIXES" ]    && ENTRY="${ENTRY}\n### 🐛 Bug Fixes\n${FIXES}\n"
          [ -n "$CHORES" ]   && ENTRY="${ENTRY}\n### 🔧 Maintenance\n${CHORES}\n"

          # Prepend to CHANGELOG.md
          echo -e "${ENTRY}\n---\n" | cat - CHANGELOG.md > /tmp/CHANGELOG.md && mv /tmp/CHANGELOG.md CHANGELOG.md

      - name: Commit changelog & tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore: release ${{ steps.version.outputs.new_version }} [skip ci]"
          git tag ${{ steps.version.outputs.new_version }} -m "Release ${{ steps.version.outputs.new_version }}"
          git push origin main --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.new_version }}
          generate_release_notes: true
          body_path: CHANGELOG.md

      - name: Trigger docs rebuild
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DOCS_DISPATCH_TOKEN }}
          repository: revokedlink/docs
          event-type: api-released
          client-payload: '{"version": "${{ steps.version.outputs.new_version }}"}'
